// ── Seguridad: sanitización de inputs ────────────────────────────────────
function sanitize(str){
  if(typeof str!=='string')return '';
  return str.replace(/[<>]/g,'').trim();
}
function isValidEmail(email){
  if(!email)return true; // campo opcional
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)&&email.length<=254;
}
function sanitizeReq(req){
  return {
    ...req,
    area:sanitize(req.area),
    locacion:sanitize(req.locacion),
    emailSolicitante:sanitize(req.emailSolicitante),
    observaciones:sanitize(req.observaciones),
    imputacionCosto:sanitize(req.imputacionCosto),
    origen:sanitize(req.origen),
    destino:sanitize(req.destino),
    pesoDimensionesCarga:sanitize(req.pesoDimensionesCarga),
    pesoEquipoIzar:sanitize(req.pesoEquipoIzar),
    dimensionesEquipoIzar:sanitize(req.dimensionesEquipoIzar),
    distanciaEquipo:sanitize(req.distanciaEquipo),
    contactos:(req.contactos||[]).map(c=>({nombre:sanitize(c.nombre),telefono:sanitize(c.telefono)})),
    responsablesPermiso:(req.responsablesPermiso||[]).map(r=>({nombre:sanitize(r.nombre),telefono:sanitize(r.telefono)})),
    recursosSolicitados:(req.recursosSolicitados||[]).map(r=>({...r,custom:sanitize(r.custom||'')})),
  };
}

// ── Archivos adjuntos ──────────────────────────────────────────────────────
function ArchivosAdjuntos({docId,archivos=[],editable=true}){
  const [uploading,setUploading]=useState(false);
  const inputRef=useRef();
  const MAX_FILE_SIZE=10*1024*1024; // 10 MB
  const ALLOWED_TYPES=['image/jpeg','image/png','image/webp','application/pdf','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','application/vnd.ms-excel','application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document','text/plain'];
  const handleUpload=async(e)=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    const invalidSize=files.filter(f=>f.size>MAX_FILE_SIZE);
    if(invalidSize.length){alert(`Archivos demasiado grandes (máx 10MB): ${invalidSize.map(f=>f.name).join(', ')}`);e.target.value='';return;}
    const invalidType=files.filter(f=>!ALLOWED_TYPES.includes(f.type)&&!f.name.match(/\.(jpg|jpeg|png|webp|pdf|xlsx|xls|doc|docx|txt)$/i));
    if(invalidType.length){alert(`Tipo de archivo no permitido: ${invalidType.map(f=>f.name).join(', ')}`);e.target.value='';return;}
    setUploading(true);
    try{for(const file of files){const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');const ref=storage.ref(`requerimientos/${docId}/${Date.now()}_${safeName}`);await ref.put(file);const url=await ref.getDownloadURL();await db.collection(COL).doc(docId).update({archivos:firebase.firestore.FieldValue.arrayUnion({nombre:file.name,url,fecha:new Date().toISOString().split('T')[0]})});}}
    catch(err){console.error('Error al subir archivo:',err);alert('Error al subir archivo. Intentá de nuevo.');}
    setUploading(false); e.target.value='';
  };
  return(
    <div style={{display:"grid",gap:8}}>
      {archivos.length===0&&<div style={{color:"#9ca3af",fontSize:13,textAlign:"center",padding:"8px 0"}}>Sin archivos adjuntos</div>}
      {archivos.map((a,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#f8fafc",borderRadius:8,padding:"8px 12px",border:"1px solid #e5e7eb"}}>
          <span style={{fontSize:18}}>📎</span>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.nombre}</div><div style={{fontSize:11,color:"#9ca3af"}}>{a.fecha}</div></div>
          <a href={a.url} target="_blank" rel="noreferrer" style={{background:"#e6f4f8",color:P303,border:`1px solid ${P314}55`,borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:600,textDecoration:"none",whiteSpace:"nowrap"}}>Ver</a>
        </div>
      ))}
      {editable&&<><input ref={inputRef} type="file" multiple onChange={handleUpload} style={{display:"none"}}/>
        <button onClick={()=>inputRef.current.click()} disabled={uploading}
          style={{background:"#f0f9fc",color:P303,border:`1px dashed ${P314}`,borderRadius:8,padding:"10px",cursor:"pointer",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,touchAction:"manipulation"}}>
          {uploading?<><span style={{display:"inline-block",width:14,height:14,border:`2px solid ${P303}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/> Subiendo...</>:"📎 Adjuntar archivos"}
        </button></>}
    </div>
  );
}

// ── Exportación Excel ──────────────────────────────────────────────────────
function exportExcel(reqs){
  const data=reqs.map(r=>({'ID':r.id||'Sin ID','Fecha Creación':r.fechaCreacion||'','Área':r.area||'','Locación':r.locacion||'','Servicio':r.servicio||'','Fecha Requerida':r.fechaRequerida||'','Prioridad':r.prioridad||'','Estado':r.estado||'','Imputación':r.imputacionCosto||'','Recursos Solicitados':(r.recursosSolicitados||[]).map(rs=>`${rs.equipo==='__custom__'?rs.custom:rs.equipo} ×${rs.cantidad}`).join(' / ')||'','Recursos Asignados':(r.recursosAsignados||[]).filter(ra=>ra.equipo).map(ra=>`${ra.equipo==='__custom__'?ra.custom:ra.equipo} ×${ra.cantidad}`).join(' / ')||'','Proveedor':(r.recursosAsignados||[]).map(ra=>ra.proveedor).filter(Boolean).join(', ')||'','Responsable':(r.recursosAsignados||[]).map(ra=>ra.responsable).filter(Boolean).join(', ')||'','Fecha Programada':r.fechaProgramada||'','Reprogramaciones':r.reprogramaciones||0,'Observaciones':r.observaciones||''}));
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[10,14,22,18,25,14,10,14,18,35,35,22,22,18,12,35].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Requerimientos');
  XLSX.writeFile(wb,`requerimientos-${new Date().toISOString().split('T')[0]}.xlsx`);
}

function KPICard({label,value,sub,color,icon,alert,tramos}){
  const total=tramos?tramos.r0_2+tramos.r2_5+tramos.r5:0;
  return(
    <div style={{background:alert?"#fef2f2":"#fff",border:`1px solid ${alert?"#fecaca":"#e5e7eb"}`,borderRadius:10,padding:"14px 16px",flex:1,minWidth:130}}>
      <div style={{fontSize:20}}>{icon}</div>
      <div style={{fontSize:24,fontWeight:800,color:alert?"#ef4444":color,marginTop:4}}>{value}</div>
      <div style={{fontSize:12,color:"#6b7280",marginTop:2,fontWeight:600}}>{label}</div>
      {sub&&!tramos&&<div style={{fontSize:11,color:alert?"#ef4444":"#9ca3af",marginTop:2}}>{sub}</div>}
      {tramos&&total>0&&(
        <div style={{marginTop:8,display:"grid",gap:4}}>
          {[
            {label:"0 – 48 hs", val:tramos.r0_2, color:"#10b981"},
            {label:"2 – 5 días", val:tramos.r2_5, color:"#f59e0b"},
            {label:"+ 5 días",  val:tramos.r5,   color:"#ef4444"},
          ].map(t=>(
            <div key={t.label} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{flex:1,background:"#f3f4f6",borderRadius:99,height:6,overflow:"hidden"}}>
                <div style={{background:t.color,height:6,borderRadius:99,width:`${(t.val/total)*100}%`,transition:"width .4s"}}/>
              </div>
              <span style={{fontSize:10,color:"#6b7280",whiteSpace:"nowrap",minWidth:54}}>{t.label}</span>
              <span style={{fontSize:11,fontWeight:700,color:t.color,minWidth:14,textAlign:"right"}}>{t.val}</span>
            </div>
          ))}
        </div>
      )}
      {tramos&&total===0&&<div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Sin datos suficientes</div>}
    </div>
  );
}
function BarChart({data,color=P314,height=130}){
  const max=Math.max(...data.map(d=>d.value),1);
  return(<div style={{display:"flex",alignItems:"stretch",gap:6,height,padding:"0 4px"}}>
    {data.map((d,i)=>(
      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",gap:3,minWidth:0}}>
        <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{d.value||""}</span>
        <div style={{width:"100%",background:typeof color==="function"?color(i):color,borderRadius:"4px 4px 0 0",height:`${(d.value/max)*75}%`,minHeight:d.value?3:0,transition:"height .4s"}}/>
        <span style={{fontSize:10,color:"#9ca3af",textAlign:"center",lineHeight:1.2,width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.label}</span>
      </div>
    ))}
  </div>);
}
function HBar({label,value,max,color=P314}){
  return(<div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"75%"}}>{label}</span>
      <span style={{fontWeight:700,color}}>{value}</span>
    </div>
    <div style={{background:"#f3f4f6",borderRadius:99,height:8}}>
      <div style={{background:color,borderRadius:99,height:8,width:`${max?(value/max)*100:0}%`,transition:"width .4s"}}/>
    </div>
  </div>);
}

function MetricasView({reqs,onBack,online,pendingWrites}){
  const [periodo,setPeriodo]=useState(30);
  const ahora=new Date();
  const hoy=ahora.toISOString().split('T')[0];
  const sColors=[P314,P303,"#10b981","#f59e0b","#7c3aed","#ef4444"];

  const filtrados=reqs.filter(r=>{
    if(periodo===-1)return true;
    if(periodo===0){const f=new Date(r.fechaCreacion||hoy);return f.getMonth()===ahora.getMonth()&&f.getFullYear()===ahora.getFullYear();}
    const f=new Date(r.fechaCreacion||hoy);
    return(ahora-f)/(1000*60*60*24)<=periodo;
  });

  const total=filtrados.length;
  const pendientes=filtrados.filter(r=>r.estado==="Pendiente").length;
  const enProceso=filtrados.filter(r=>r.estado==="En Proceso").length;
  const completados=filtrados.filter(r=>r.estado==="Completado").length;
  const cancelados=filtrados.filter(r=>r.estado==="Cancelado").length;
  const reprogramados=filtrados.reduce((a,r)=>a+(r.reprogramaciones||0),0);
  const vencidos=filtrados.filter(r=>r.fechaRequerida<hoy&&r.estado!=="Completado"&&r.estado!=="Cancelado").length;
  const urgentes=filtrados.filter(r=>(r.prioridad==="Urgente"||r.prioridad==="Alta")&&r.estado==="Pendiente").length;
  const pctCompletado=total>0?Math.round((completados/total)*100):0;

  const conProg=filtrados.filter(r=>r.fechaProgramada&&r.fechaCreacion);
  const diasAsig=conProg.map(r=>Math.max(0,(new Date(r.fechaProgramada.split('T')[0])-new Date(r.fechaCreacion))/(1000*60*60*24)));
  const avgAsig=diasAsig.length>0?Math.round(diasAsig.reduce((a,d)=>a+d,0)/diasAsig.length):null;
  const tramos={r0_2:diasAsig.filter(d=>d<=2).length, r2_5:diasAsig.filter(d=>d>2&&d<=5).length, r5:diasAsig.filter(d=>d>5).length};

  const porServicio=SERVICIOS.map((s,i)=>({label:ABREV_SERVICIO[s]||s,value:filtrados.filter(r=>r.servicio===s).length,full:s}));
  const porLocacion=LOCACIONES.map(l=>({label:ABREV_LOCACION[l]||l,value:filtrados.filter(r=>r.locacion===l).length}));

  const imputMap={};
  filtrados.forEach(r=>{if(r.imputacionCosto)imputMap[r.imputacionCosto]=(imputMap[r.imputacionCosto]||0)+1;});
  const topImput=Object.entries(imputMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxImput=topImput[0]?.[1]||1;

  const semanas=Array.from({length:8},(_,i)=>{
    const desde=new Date(ahora);desde.setDate(desde.getDate()-(7-i)*7);
    const hasta=new Date(ahora);hasta.setDate(hasta.getDate()-(6-i)*7);
    const ds=desde.toISOString().split('T')[0],hs=hasta.toISOString().split('T')[0];
    return{label:`S${i+1}`,value:reqs.filter(r=>(r.fechaCreacion||'')>=ds&&(r.fechaCreacion||'')<hs).length};
  });

  const Card=({title,children})=>(
    <div style={{background:"#fff",borderRadius:12,padding:20,border:"1px solid #e5e7eb"}}>
      <div style={{fontWeight:700,color:P303,fontSize:14,marginBottom:16}}>{title}</div>
      {children}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <StatusBar online={online} pendingWrites={pendingWrites}/>
      <div style={{background:GRAD,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",cursor:"pointer",fontSize:18,borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <div style={{flex:1}}><div style={{color:"#fff",fontWeight:700,fontSize:16}}>📈 Métricas y KPIs</div><div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>Panel de indicadores logísticos</div></div>
        <select value={periodo} onChange={e=>setPeriodo(Number(e.target.value))}
          style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,outline:"none",cursor:"pointer",WebkitAppearance:"none"}}>
          <option value={7} style={{color:"#000"}}>Últimos 7 días</option>
          <option value={30} style={{color:"#000"}}>Últimos 30 días</option>
          <option value={0} style={{color:"#000"}}>Mes actual</option>
          <option value={-1} style={{color:"#000"}}>Todo el historial</option>
        </select>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
          <KPICard label="Total" value={total} color={P303} icon="📋"/>
          <KPICard label="Pendientes" value={pendientes} color="#f59e0b" icon="⏳"/>
          <KPICard label="En Proceso" value={enProceso} color={P314} icon="⚙️"/>
          <KPICard label="Completados" value={completados} color="#10b981" icon="✅"/>
          <KPICard label="Cancelados" value={cancelados} color="#6b7280" icon="❌"/>
          <KPICard label="Reprogramados" value={reprogramados} color="#7c3aed" icon="🔄" sub="cambios post-asignación"/>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
          <KPICard label="Vencidos" value={vencidos} color="#ef4444" icon="⚠️" alert={vencidos>0} sub="sin completar, fuera de fecha"/>
          <KPICard label="Alta/Urgente sin asignar" value={urgentes} color="#ef4444" icon="🚨" alert={urgentes>0}/>
          <KPICard label="% Completados" value={`${pctCompletado}%`} color="#10b981" icon="📊" sub={`${completados} de ${total}`}/>
          <KPICard label="Días prom. a programar" value={avgAsig!==null?`${avgAsig}d`:"—"} color={P314} icon="⏱️" sub="creación → fecha programada" tramos={avgAsig!==null?tramos:null}/>
        </div>
        <div className="grid-2" style={{gap:16,marginBottom:16}}>
          <Card title="📦 Por Tipo de Servicio"><BarChart data={porServicio} color={i=>sColors[i%sColors.length]} height={150}/></Card>
          <Card title="📍 Por Locación"><BarChart data={porLocacion} color={P314} height={150}/></Card>
        </div>
        <div className="grid-3-2" style={{marginBottom:16}}>
          <Card title="📈 Evolución Semanal (últimas 8 semanas)"><BarChart data={semanas} color={P303} height={150}/></Card>
          <Card title="💰 Top Imputaciones de Costo">
            {topImput.length===0?<div style={{color:"#9ca3af",fontSize:13,textAlign:"center",padding:"20px 0"}}>Sin datos en el período</div>
            :topImput.map(([imp,cnt])=><HBar key={imp} label={imp} value={cnt} max={maxImput}/>)}
          </Card>
        </div>
        <div className="grid-2" style={{gap:16,marginBottom:16}}>
          <Card title="🎯 Distribución por Prioridad">
            <BarChart data={PRIORIDADES.map(p=>({label:p,value:filtrados.filter(r=>r.prioridad===p).length}))} color={i=>Object.values(prioridadColor)[i]} height={130}/>
          </Card>
          <Card title="🔄 Reprogramaciones por Servicio">
            {SERVICIOS.map(s=>{const val=filtrados.filter(r=>r.servicio===s).reduce((a,r)=>a+(r.reprogramaciones||0),0);return <HBar key={s} label={`${servicioIcon[s]} ${ABREV_SERVICIO[s]||s}`} value={val} max={Math.max(reprogramados,1)} color="#7c3aed"/>;})}</Card>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [view,setView]           = useState("home");
  const [reqs,setReqs]           = useState([]);
  const [loading,setLoading]     = useState(true);
  const [online,setOnline]       = useState(navigator.onLine);
  const [pending,setPending]     = useState(false);
  const [search,setSearch]       = useState("");
  const [filtroS,setFiltroS]     = useState("");
  const [filtroE,setFiltroE]     = useState("");
  const [asignando,setAsignando] = useState(null);
  const [asignForm,setAsignForm] = useState({id:"",recursosAsignados:[emptyAsignado()],fechaProgramada:""});
  const [newReq,setNewReq]       = useState(emptyReq());
  const [submitted,setSubmitted] = useState(false);
  const [enviando,setEnviando]   = useState(false);
  const [lastDocId,setLastDocId] = useState("");
  const [errors,setErrors]       = useState({});

  useEffect(()=>{
    const unsub=db.collection(COL).orderBy('_ts','asc').onSnapshot({includeMetadataChanges:true},snap=>{setReqs(snap.docs.map(d=>({...d.data(),_docId:d.id})));setPending(snap.docs.some(d=>d.metadata.hasPendingWrites));setLoading(false);},()=>setLoading(false));
    return unsub;
  },[]);
  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return()=>{ window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  },[]);

  const handleServicio=v=>setNewReq(p=>({...p,servicio:v,recursosSolicitados:[emptyRecurso()]}));

  const filtered=reqs.filter(r=>{
    const q=search.toLowerCase();
    return(!filtroS||r.servicio===filtroS)&&(!filtroE||r.estado===filtroE)&&(!q||(r.id||"").toLowerCase().includes(q)||(r.area||"").toLowerCase().includes(q)||(r.locacion||"").toLowerCase().includes(q));
  });

  const validate=()=>{const e={};if(!newReq.area.trim())e.area=true;if(!newReq.locacion)e.locacion=true;if(!newReq.servicio)e.servicio=true;if(!newReq.fechaRequerida)e.fechaRequerida=true;if(!newReq.imputacionCosto.trim())e.imputacionCosto=true;if(newReq.emailSolicitante&&!isValidEmail(newReq.emailSolicitante))e.emailSolicitante=true;return e;};

  const [submitError,setSubmitError]=useState("");
  const submitReq=async()=>{
    setSubmitError("");
    const e=validate();if(Object.keys(e).length){setErrors(e);return;}
    setEnviando(true);
    try{
      const safe=sanitizeReq(newReq);
      const docRef=await db.collection(COL).add({...safe,id:"",estado:"Pendiente",fechaCreacion:new Date().toISOString().split("T")[0],recursosAsignados:[],fechaProgramada:"",archivos:[],reprogramaciones:0,_ts:Date.now()});
      setLastDocId(docRef.id);setSubmitted(true);
    }
    catch(err){console.error('Error al enviar:',err);setSubmitError(err.message||'Error desconocido al enviar');}
    finally{setEnviando(false);}
  };

  const resetForm=()=>{setNewReq(emptyReq());setSubmitted(false);setEnviando(false);setLastDocId("");setErrors({});};

  const abrirAsignar=req=>{setAsignando(req);setAsignForm({id:req.id||"",recursosAsignados:req.recursosAsignados?.length?req.recursosAsignados.map(r=>({...r})):[emptyAsignado()],fechaProgramada:req.fechaProgramada||""});};

  const guardarAsignacion=async()=>{
    const safeId=sanitize(asignForm.id);
    const safeRecursos=asignForm.recursosAsignados.map(r=>({...r,custom:sanitize(r.custom||''),proveedor:sanitize(r.proveedor||''),responsable:sanitize(r.responsable||'')}));
    const esNuevoId=safeId&&safeId!==asignando.id;
    const esReprog=asignando.estado==="En Proceso";
    const upd={id:safeId,recursosAsignados:safeRecursos,fechaProgramada:asignForm.fechaProgramada,estado:safeRecursos.some(ra=>ra.equipo)?"En Proceso":asignando.estado};
    if(esReprog) upd.reprogramaciones=firebase.firestore.FieldValue.increment(1);
    await db.collection(COL).doc(asignando._docId).update(upd);
    if(esNuevoId&&asignando.emailSolicitante&&EMAILJS_PUBLIC_KEY!=="TU_PUBLIC_KEY"){
      try{await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{to_email:asignando.emailSolicitante,req_id:asignForm.id,req_servicio:asignando.servicio,req_area:asignando.area,req_locacion:asignando.locacion,req_fecha:asignando.fechaRequerida,req_prioridad:asignando.prioridad,req_fecha_prog:asignForm.fechaProgramada||'A confirmar'});}
      catch(e){console.warn('Email:',e);}
    }
    setAsignando(null);
  };

  const completar=async r=>await db.collection(COL).doc(r._docId).update({estado:"Completado"});
  const cancelar =async r=>await db.collection(COL).doc(r._docId).update({estado:"Cancelado"});

  const pendientes=reqs.filter(r=>r.estado==="Pendiente").length;
  const enProceso=reqs.filter(r=>r.estado==="En Proceso").length;
  const completados=reqs.filter(r=>r.estado==="Completado").length;
  const maxSvc=Math.max(...SERVICIOS.map(s=>reqs.filter(r=>r.servicio===s).length),1);

  const navHeader=(title,sub,extra)=>(
    <div style={{background:GRAD,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
      <button onClick={()=>{setView("home");resetForm();}} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",cursor:"pointer",fontSize:18,borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
      <div style={{flex:1}}><div style={{color:"#fff",fontWeight:700,fontSize:16}}>{title}</div><div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>{sub}</div></div>
      {extra}
    </div>
  );

  if(view==="metricas") return <MetricasView reqs={reqs} onBack={()=>setView("logistica")} online={online} pendingWrites={pending}/>;

  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:GRAD2,flexDirection:"column",gap:16}}><div style={{fontSize:52}}>🏗️</div><div style={{color:"#fff",fontSize:18,fontWeight:600}}>Cargando...</div><div style={{color:"rgba(255,255,255,.7)",fontSize:13}}>{navigator.onLine?"Conectando...":"Cargando datos locales..."}</div></div>);

  // ── HOME ──────────────────────────────────────────────────────────────────
  if(view==="home")return(
    <div style={{minHeight:"100vh",background:GRAD2,display:"flex",flexDirection:"column"}}>
      <StatusBar online={online} pendingWrites={pending}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{textAlign:"center",color:"#fff",width:"100%",maxWidth:400}}>
          <div style={{fontSize:52,marginBottom:10}}>🏗️</div>
          <h1 style={{fontSize:24,fontWeight:800,lineHeight:1.2}}>Sistema de Requerimientos Logísticos</h1>
          <p style={{color:"rgba(255,255,255,.75)",marginTop:10,fontSize:14,lineHeight:1.5}}>Izajes · Carga Terrestre · Mantenimiento · Cargas Líquidas · Agua · GasOil</p>
          <div style={{display:"grid",gap:12,marginTop:36}}>
            <button onClick={()=>setView("solicitante")} style={{background:"#fff",color:P303,border:"none",borderRadius:12,padding:"20px 24px",fontWeight:700,fontSize:17,cursor:"pointer",boxShadow:"0 4px 20px #0004",touchAction:"manipulation"}}>
              📝 Ingresar Requerimiento<div style={{fontSize:13,fontWeight:400,color:"#6b7280",marginTop:4}}>Soy solicitante</div>
            </button>
            <button onClick={()=>setView("logistica")} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"2px solid rgba(255,255,255,.5)",borderRadius:12,padding:"20px 24px",fontWeight:700,fontSize:17,cursor:"pointer",boxShadow:"0 4px 20px #0004",touchAction:"manipulation"}}>
              📊 Programación Logística<div style={{fontSize:13,fontWeight:400,color:"rgba(255,255,255,.7)",marginTop:4}}>Equipo interno</div>
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  // ── SOLICITANTE ───────────────────────────────────────────────────────────
  if(view==="solicitante")return(
    <div style={{minHeight:"100vh",background:"#f8fafc",display:"flex",flexDirection:"column"}}>
      <StatusBar online={online} pendingWrites={pending}/>
      {navHeader("📝 Nuevo Requerimiento","Completá los datos de tu solicitud")}
      <div style={{flex:1,overflowY:"auto",padding:"16px",maxWidth:640,margin:"0 auto",width:"100%"}}>
        {submitted?(
          <div style={{background:"#fff",borderRadius:14,padding:28,boxShadow:"0 2px 16px #0001",animation:"fadeIn .3s ease",display:"grid",gap:16,marginBottom:24}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:56}}>✅</div>
              <h2 style={{color:"#10b981",margin:"12px 0 6px",fontSize:20}}>¡Requerimiento enviado!</h2>
              <p style={{color:"#6b7280",fontSize:14,lineHeight:1.5}}>Tu solicitud fue registrada y será gestionada por Programación Logística.</p>
              <div style={{background:"#e6f4f8",border:`1px solid ${P314}55`,borderRadius:10,padding:14,margin:"14px 0",fontSize:14,color:P303,lineHeight:1.5}}>
                📧 En breve recibirás un correo con el ID asignado para seguimiento.
              </div>
              {!online&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:12,fontSize:13,color:"#92400e",marginBottom:8}}>⚠️ Sin conexión — el requerimiento se enviará al recuperar señal.</div>}
            </div>
            {lastDocId&&(<Seccion titulo="📎 Adjuntar Archivos al Requerimiento">
              <p style={{fontSize:13,color:"#6b7280",margin:0}}>Podés adjuntar planos, fotos u otros documentos relacionados.</p>
              <ArchivosAdjuntos docId={lastDocId} archivos={reqs.find(r=>r._docId===lastDocId)?.archivos||[]} editable={true}/>
            </Seccion>)}
            <button onClick={resetForm} style={{background:P303,color:"#fff",border:"none",borderRadius:10,padding:"14px 28px",fontWeight:600,cursor:"pointer",fontSize:16,width:"100%",touchAction:"manipulation"}}>Cargar otro requerimiento</button>
          </div>
        ):(
          <div style={{display:"grid",gap:14,paddingBottom:24}}>
            <Seccion titulo="📋 Datos Generales">
              <div style={S.field}><label style={S.label}>Área Solicitante *</label>
                <input style={S.input(errors.area)} value={newReq.area} onChange={e=>{setNewReq(p=>({...p,area:e.target.value}));setErrors(p=>({...p,area:false}));}} placeholder="Ej: Mantenimiento, Operaciones..."/>
                {errors.area&&<span style={S.err}>Campo requerido</span>}
              </div>
              <div style={S.field}><label style={S.label}>Email de contacto</label>
                <input style={S.input(errors.emailSolicitante)} value={newReq.emailSolicitante} onChange={e=>{setNewReq(p=>({...p,emailSolicitante:e.target.value}));setErrors(p=>({...p,emailSolicitante:false}));}} placeholder="tu@email.com" type="email" inputMode="email"/>
                {errors.emailSolicitante?<span style={S.err}>Email inválido</span>:<span style={{fontSize:11,color:"#9ca3af"}}>Para recibir el ID asignado y novedades del requerimiento</span>}
              </div>
              <div style={S.field}><label style={S.label}>Locación *</label>
                <select style={S.input(errors.locacion)} value={newReq.locacion} onChange={e=>{setNewReq(p=>({...p,locacion:e.target.value}));setErrors(p=>({...p,locacion:false}));}}>
                  <option value="">Seleccioná la locación...</option>
                  {LOCACIONES.map(l=><option key={l} value={l}>📍 {l}</option>)}
                </select>
                {errors.locacion&&<span style={S.err}>Campo requerido</span>}
              </div>
              <div className="grid-2">
                <div style={S.field}><label style={S.label}>Tipo de Servicio *</label>
                  <select style={S.input(errors.servicio)} value={newReq.servicio} onChange={e=>{handleServicio(e.target.value);setErrors(p=>({...p,servicio:false}));}}>
                    <option value="">Seleccioná...</option>
                    {SERVICIOS.map(s=><option key={s} value={s}>{servicioIcon[s]} {s}</option>)}
                  </select>
                  {errors.servicio&&<span style={S.err}>Campo requerido</span>}
                </div>
                <div style={S.field}><label style={S.label}>Fecha Requerida *</label>
                  <input type="date" style={S.input(errors.fechaRequerida)} value={newReq.fechaRequerida} onChange={e=>{const v=e.target.value;const diff=(new Date(v)-new Date(new Date().toISOString().split('T')[0]))/(86400000);setNewReq(p=>({...p,fechaRequerida:v,...(diff<2&&diff>=0?{prioridad:"Urgente"}:{})}));setErrors(p=>({...p,fechaRequerida:false}));}}/>
                  {errors.fechaRequerida&&<span style={S.err}>Campo requerido</span>}
                </div>
              </div>
              <div style={S.field}><label style={S.label}>Prioridad</label>
                <select style={S.input()} value={newReq.prioridad} onChange={e=>setNewReq(p=>({...p,prioridad:e.target.value}))}>
                  {PRIORIDADES.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </Seccion>

            {newReq.servicio==="Carga Terrestre"&&<CamposCargaTerrestre req={newReq} setReq={setNewReq}/>}
            {newReq.servicio==="Izajes"&&<CamposIzajes req={newReq} setReq={setNewReq}/>}
            {newReq.servicio==="Provisión de GasOil"&&<CamposGasOil req={newReq} setReq={setNewReq}/>}

            {newReq.servicio&&EQUIPOS_POR_SERVICIO[newReq.servicio]!==undefined&&(
              <Seccion titulo="🔧 Recursos Solicitados">
                <RecursosEditor recursos={newReq.recursosSolicitados} onChange={v=>setNewReq(p=>({...p,recursosSolicitados:v}))} servicio={newReq.servicio} asignacion={false}/>
              </Seccion>
            )}
            <Seccion titulo="👤 Personas de Contacto"><PersonasEditor personas={newReq.contactos} onChange={v=>setNewReq(p=>({...p,contactos:v}))} titulo="contacto"/></Seccion>
            <Seccion titulo="📄 Responsables del Permiso de Trabajo"><PersonasEditor personas={newReq.responsablesPermiso} onChange={v=>setNewReq(p=>({...p,responsablesPermiso:v}))} titulo="responsable"/></Seccion>
            <Seccion titulo="💰 Imputación del Costo *">
              <input style={S.input(errors.imputacionCosto)} value={newReq.imputacionCosto} onChange={e=>{setNewReq(p=>({...p,imputacionCosto:e.target.value}));setErrors(p=>({...p,imputacionCosto:false}));}} placeholder="Ej: CC-1234 / OT-5678 / Proyecto Norte..."/>
              {errors.imputacionCosto&&<span style={S.err}>Campo requerido</span>}
            </Seccion>
            <Seccion titulo="📝 Observaciones">
              <textarea style={{...S.input(),height:90,resize:"vertical"}} value={newReq.observaciones} onChange={e=>setNewReq(p=>({...p,observaciones:e.target.value}))} placeholder="Información adicional relevante..."/>
            </Seccion>
            {submitError&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"12px 16px",color:"#dc2626",fontSize:14,fontWeight:600,marginBottom:8}}>⚠️ Error: {submitError}</div>}
            <button onClick={submitReq} disabled={enviando}
              style={{background:enviando?"#6abecc":P303,color:"#fff",border:"none",borderRadius:12,padding:"16px",fontWeight:700,fontSize:17,cursor:enviando?"not-allowed":"pointer",transition:"background .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:10,touchAction:"manipulation",marginTop:4}}>
              {enviando?<><span style={{display:"inline-block",width:18,height:18,border:"2.5px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/> Enviando...</>:"Enviar Requerimiento →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // ── LOGÍSTICA ─────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <StatusBar online={online} pendingWrites={pending}/>
      {navHeader("📊 Programación Logística","Gestión y asignación de requerimientos",
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>exportExcel(filtered)} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>📊 Excel</button>
          <button onClick={()=>setView("metricas")} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>📈 Métricas</button>
        </div>
      )}

      <div style={{maxWidth:1300,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
          <StatCard label="Total"       value={reqs.length} color={P303} icon="📋"/>
          <StatCard label="Pendientes"  value={pendientes}  color="#f59e0b" icon="⏳"/>
          <StatCard label="En Proceso"  value={enProceso}   color={P314} icon="⚙️"/>
          <StatCard label="Completados" value={completados} color="#10b981" icon="✅"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
          <div style={{background:"#fff",borderRadius:10,padding:18,border:"1px solid #e5e7eb"}}><div style={{fontWeight:700,color:P303,marginBottom:12,fontSize:14}}>Por Servicio</div>{SERVICIOS.map(s=><MiniBar key={s} label={`${servicioIcon[s]} ${ABREV_SERVICIO[s]||s}`} value={reqs.filter(r=>r.servicio===s).length} max={maxSvc} color={P314}/>)}</div>
          <div style={{background:"#fff",borderRadius:10,padding:18,border:"1px solid #e5e7eb"}}><div style={{fontWeight:700,color:P303,marginBottom:12,fontSize:14}}>Por Estado</div>{ESTADOS.map(s=><MiniBar key={s} label={s} value={reqs.filter(r=>r.estado===s).length} max={reqs.length} color={estadoColor[s]}/>)}</div>
        </div>

        <div style={{background:"#fff",borderRadius:10,padding:14,border:"1px solid #e5e7eb",marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input style={{flex:1,minWidth:160,padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:15,outline:"none"}} placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={{padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:14,WebkitAppearance:"none"}} value={filtroS} onChange={e=>setFiltroS(e.target.value)}>
            <option value="">Todos los servicios</option>{SERVICIOS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <select style={{padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:14,WebkitAppearance:"none"}} value={filtroE} onChange={e=>setFiltroE(e.target.value)}>
            <option value="">Todos los estados</option>{ESTADOS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f8fafc",borderBottom:`2px solid ${P314}44`}}>
                {["ID","Fecha","Área","Locación","Servicio","Fecha Req.","Prioridad","Estado","Rec. Solicitados","Rec. Asignados","Contactos","Imputación","Archivos","Acciones"].map(h=>(
                  <th key={h} style={{padding:"11px 13px",textAlign:"left",fontWeight:700,color:P303,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={14} style={{padding:32,textAlign:"center",color:"#9ca3af"}}>No hay requerimientos</td></tr>}
                {filtered.map((r,i)=>(
                  <tr key={r._docId||i} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#f9fbfc"}}>
                    <td style={{padding:"10px 13px",fontWeight:700,color:P303,whiteSpace:"nowrap"}}>{r.id||<span style={{color:"#d1d5db",fontWeight:400,fontStyle:"italic"}}>Sin ID</span>}</td>
                    <td style={{padding:"10px 13px",color:"#6b7280",whiteSpace:"nowrap"}}>{r.fechaCreacion}</td>
                    <td style={{padding:"10px 13px",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.area}</td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}><Badge color={P314} text={`📍 ${r.locacion}`}/></td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}><Badge color={P303} text={`${servicioIcon[r.servicio]} ${r.servicio}`}/></td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}>{r.fechaRequerida}</td>
                    <td style={{padding:"10px 13px"}}><Badge color={prioridadColor[r.prioridad]} text={r.prioridad}/></td>
                    <td style={{padding:"10px 13px"}}><Badge color={estadoColor[r.estado]} text={r.estado}/></td>
                    <td style={{padding:"10px 13px",maxWidth:160,fontSize:12}}>{(r.recursosSolicitados||[]).map((rs,idx)=><div key={idx} style={{whiteSpace:"nowrap"}}>🔸 {rs.equipo==="__custom__"?rs.custom:rs.equipo} <strong>×{rs.cantidad}</strong></div>)}</td>
                    <td style={{padding:"10px 13px",maxWidth:160,fontSize:12}}>{!(r.recursosAsignados||[]).length?<span style={{color:"#d1d5db"}}>Sin asignar</span>:(r.recursosAsignados||[]).map((ra,idx)=><div key={idx} style={{whiteSpace:"nowrap",color:"#10b981"}}>✅ {ra.equipo==="__custom__"?ra.custom:ra.equipo} <strong>×{ra.cantidad}</strong></div>)}</td>
                    <td style={{padding:"10px 13px",fontSize:12,maxWidth:140}}>{(r.contactos||[]).filter(c=>c.nombre).map((c,idx)=><div key={idx} style={{whiteSpace:"nowrap"}}>👤 {c.nombre} {c.telefono&&<a href={`https://wa.me/549${c.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366",textDecoration:"none"}}>📱</a>}</div>)}</td>
                    <td style={{padding:"10px 13px",fontSize:12,color:r.imputacionCosto?"#374151":"#d1d5db",whiteSpace:"nowrap"}}>{r.imputacionCosto||"—"}</td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap",fontSize:12}}><span style={{color:(r.archivos||[]).length>0?P314:"#d1d5db",fontWeight:600}}>📎 {(r.archivos||[]).length}</span></td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",gap:5}}>
                        {r.estado!=="Completado"&&r.estado!=="Cancelado"&&(
                          <button onClick={()=>abrirAsignar(r)} style={{background:"#e6f4f8",color:P303,border:`1px solid ${P314}55`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600,touchAction:"manipulation"}}>{r.estado==="Pendiente"?"Asignar":"Editar"}</button>
                        )}
                        {r.estado==="En Proceso"&&<button onClick={()=>completar(r)} style={{background:"#f0fdf4",color:"#10b981",border:"1px solid #bbf7d0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✓</button>}
                        {r.estado==="Pendiente"&&<button onClick={()=>cancelar(r)} style={{background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✕</button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Modal Asignar */}
      {asignando&&(
        <div style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setAsignando(null);}}>
          <div style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxWidth:760,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 40px #0003",animation:"fadeIn .25s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div><h3 style={{color:P303,fontSize:17,margin:0}}>Asignar Requerimiento</h3><div style={{color:"#6b7280",fontSize:13,marginTop:2}}>{servicioIcon[asignando.servicio]} {asignando.servicio}</div></div>
              <button onClick={()=>setAsignando(null)} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:16,color:"#374151"}}>✕</button>
            </div>
            <div style={{background:"#e6f4f8",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,display:"flex",flexWrap:"wrap",gap:10}}>
              <span>🏢 <strong>{asignando.area}</strong></span>
              <span>📍 <strong>{asignando.locacion}</strong></span>
              <span>📅 <strong>{asignando.fechaRequerida}</strong></span>
              <Badge color={prioridadColor[asignando.prioridad]} text={asignando.prioridad}/>
              {asignando.emailSolicitante&&<span style={{color:P303}}>✉️ {asignando.emailSolicitante}</span>}
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>N° / ID de Solicitud</label>
              <input style={S.input()} value={asignForm.id} onChange={e=>setAsignForm(p=>({...p,id:e.target.value}))} placeholder="Ej: SOL-001, OT-2345..."/>
              {asignando.emailSolicitante&&asignForm.id&&asignForm.id!==asignando.id&&<span style={{fontSize:11,color:"#10b981",marginTop:3,display:"block"}}>📧 Se enviará email a {asignando.emailSolicitante} al guardar</span>}
            </div>

            {asignando.servicio==="Carga Terrestre"&&(asignando.origen||asignando.destino)&&(
              <div style={{background:"#e6f4f8",border:`1px solid ${P314}55`,borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:P303,marginBottom:8}}>🚛 Datos de Carga</div>
                {asignando.origen&&<div>📦 <strong>Origen:</strong> {asignando.origen}{asignando.contactoOrigen?.nombre&&` — ${asignando.contactoOrigen.nombre} ${asignando.contactoOrigen.telefono||''}`}</div>}
                {asignando.destino&&<div style={{marginTop:4}}>🏁 <strong>Destino:</strong> {asignando.destino}{asignando.contactoDestino?.nombre&&` — ${asignando.contactoDestino.nombre} ${asignando.contactoDestino.telefono||''}`}</div>}
                {asignando.pesoDimensionesCarga&&<div style={{marginTop:4}}>⚖️ <strong>Peso/Dim:</strong> {asignando.pesoDimensionesCarga}</div>}
              </div>
            )}
            {asignando.servicio==="Izajes"&&(asignando.pesoEquipoIzar||asignando.distanciaEquipo)&&(
              <div style={{background:"#f0ecff",border:"1px solid #c4b5fd",borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#5b21b6",marginBottom:8}}>🏗️ Datos de Izaje</div>
                {asignando.pesoEquipoIzar&&<div>⚖️ <strong>Peso:</strong> {asignando.pesoEquipoIzar}</div>}
                {asignando.dimensionesEquipoIzar&&<div style={{marginTop:4}}>📐 <strong>Dimensiones:</strong> {asignando.dimensionesEquipoIzar}</div>}
                {asignando.distanciaEquipo&&<div style={{marginTop:4}}>📏 <strong>Distancia:</strong> {asignando.distanciaEquipo}</div>}
              </div>
            )}
            {asignando.servicio==="Provisión de GasOil"&&(asignando.gradoGasOil||asignando.litrosGasOil)&&(
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#92400e",marginBottom:8}}>⛽ Datos de GasOil</div>
                {asignando.gradoGasOil&&<div><strong>Grado:</strong> {asignando.gradoGasOil}</div>}
                {asignando.litrosGasOil&&<div style={{marginTop:4}}><strong>Litros:</strong> {asignando.litrosGasOil} lts</div>}
              </div>
            )}
            {(asignando.contactos||[]).some(c=>c.nombre)&&(
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#166534",marginBottom:6}}>👤 Contactos</div>
                {(asignando.contactos||[]).filter(c=>c.nombre).map((c,i)=><div key={i}>• {c.nombre} {c.telefono&&<a href={`https://wa.me/549${c.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366"}}>📱 {c.telefono}</a>}</div>)}
              </div>
            )}
            {(asignando.responsablesPermiso||[]).some(r=>r.nombre)&&(
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#92400e",marginBottom:6}}>📄 Responsables del Permiso</div>
                {(asignando.responsablesPermiso||[]).filter(r=>r.nombre).map((r,i)=><div key={i}>• {r.nombre} {r.telefono&&<a href={`https://wa.me/549${r.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366"}}>📱 {r.telefono}</a>}</div>)}
              </div>
            )}
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#92400e",marginBottom:8}}>📋 Recursos Solicitados</div>
              {(asignando.recursosSolicitados||[]).map((rs,i)=><div key={i} style={{fontSize:13,color:"#78350f",marginBottom:4}}>🔸 <strong>{rs.equipo==="__custom__"?rs.custom:rs.equipo}</strong> ×{rs.cantidad}</div>)}
            </div>

            <div style={{fontWeight:700,color:P303,fontSize:14,marginBottom:10}}>⚙️ Recursos a Asignar</div>
            <RecursosEditor recursos={asignForm.recursosAsignados} onChange={v=>setAsignForm(p=>({...p,recursosAsignados:v}))} servicio={asignando.servicio} asignacion={true}/>

            <div style={{marginTop:14}}>
              <label style={S.label}>Fecha y Hora Programada</label>
              <input type="datetime-local" style={S.input()} value={asignForm.fechaProgramada} onChange={e=>setAsignForm(p=>({...p,fechaProgramada:e.target.value}))}/>
            </div>
            <div style={{marginTop:16}}>
              <div style={{fontWeight:700,color:P303,fontSize:14,marginBottom:10}}>📎 Archivos Adjuntos</div>
              <ArchivosAdjuntos docId={asignando._docId} archivos={asignando.archivos||[]} editable={true}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginTop:20}}>
              <button onClick={()=>setAsignando(null)} style={{background:"#f3f4f6",color:"#374151",border:"none",borderRadius:10,padding:14,fontWeight:600,cursor:"pointer",fontSize:15,touchAction:"manipulation"}}>Cancelar</button>
              <button onClick={guardarAsignacion} style={{background:GRAD,color:"#fff",border:"none",borderRadius:10,padding:14,fontWeight:700,cursor:"pointer",fontSize:15,touchAction:"manipulation"}}>Guardar Asignación</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
