<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

<script type="text/babel">
const {useState,useEffect} = React;
const COL = 'requerimientos';

const SERVICIOS   = ["Izajes","Carga Terrestre","Mantenimiento de Caminos","Cargas Líquidas","Transporte de Agua","Provisión de GasOil"];
const ESTADOS     = ["Pendiente","En Proceso","Completado","Cancelado"];
const PRIORIDADES = ["Baja","Media","Alta","Urgente"];
const LOCACIONES  = ["La Calera","Bajo del Choique","Rio Colorado"];

const EQUIPOS_POR_SERVICIO = {
  "Izajes":                  ["Grúa 25T","Grúa 50T","Grúa 70T","Grúa 130T","Hidrogrúa"],
  "Carga Terrestre":         ["Semirremolque","Hidrogrúa","Cama Baja","Furgón","Playo"],
  "Mantenimiento de Caminos":["Motoniveladora","Pala Cargadora","Camión Regador","Camión Volcador","Camión de Riego"],
  "Cargas Líquidas":         ["Camión Cisterna"],
  "Transporte de Agua":      ["Cisterna 10m3","Cisterna 35m3"],
  "Provisión de GasOil":     [],
};

const estadoColor    = {Pendiente:"#f59e0b","En Proceso":"#3b82f6",Completado:"#10b981",Cancelado:"#6b7280"};
const servicioIcon   = {Izajes:"🏗️","Carga Terrestre":"🚛","Mantenimiento de Caminos":"🛤️","Cargas Líquidas":"🛢️","Transporte de Agua":"💧","Provisión de GasOil":"⛽"};
const prioridadColor = {Baja:"#10b981",Media:"#f59e0b",Alta:"#ef4444",Urgente:"#7c3aed"};

const emptyRecurso  = () => ({equipo:"",custom:"",cantidad:1});
const emptyAsignado = () => ({equipo:"",custom:"",cantidad:1,proveedor:"",responsable:""});
const emptyPersona  = () => ({nombre:"",telefono:""});
const emptyReq = () => ({
  area:"",locacion:"",servicio:"",fechaRequerida:"",observaciones:"",prioridad:"Media",
  recursosSolicitados:[emptyRecurso()],
  contactos:[emptyPersona()],responsablesPermiso:[emptyPersona()],imputacionCosto:"",
  origen:"",contactoOrigen:{nombre:"",telefono:""},
  destino:"",contactoDestino:{nombre:"",telefono:""},
  pesoDimensionesCarga:"",pesoEquipoIzar:"",dimensionesEquipoIzar:"",distanciaEquipo:"",
  litrosGasOil:"", gradoGasOil:"",
});

// ── Estilos base ───────────────────────────────────────────────────────────
const S = {
  input: (err) => ({
    width:"100%",padding:"12px 14px",borderRadius:8,
    border:`1.5px solid ${err?"#ef4444":"#d1d5db"}`,
    fontSize:16,outline:"none",boxSizing:"border-box",background:"#fff",
    WebkitAppearance:"none",appearance:"none"
  }),
  label: {fontSize:13,fontWeight:600,color:"#374151",marginBottom:5,display:"block"},
  errMsg: {color:"#ef4444",fontSize:12,marginTop:3},
  field: {display:"grid",gap:4},
};

// ── Componentes base ───────────────────────────────────────────────────────
function Badge({color,text}){
  return <span style={{background:color+"20",color,border:`1px solid ${color}40`,borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{text}</span>;
}
function StatCard({label,value,color,icon}){
  return(
    <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:10,padding:"14px 16px",flex:1,minWidth:110}}>
      <div style={{fontSize:20}}>{icon}</div>
      <div style={{fontSize:26,fontWeight:700,color}}>{value}</div>
      <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{label}</div>
    </div>
  );
}
function MiniBar({label,value,max,color}){
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
        <span>{label}</span><span style={{fontWeight:600}}>{value}</span>
      </div>
      <div style={{background:"#f3f4f6",borderRadius:99,height:7}}>
        <div style={{background:color,borderRadius:99,height:7,width:`${max?(value/max)*100:0}%`,transition:"width .4s"}}/>
      </div>
    </div>
  );
}
function StatusBar({online,pendingWrites}){
  const [bg,brd,color,msg] = online
    ? pendingWrites
      ? ["#fffbeb","#fde68a","#92400e","⏳ Sincronizando..."]
      : ["#f0fdf4","#bbf7d0","#166534","🟢 En línea"]
    : ["#fef2f2","#fecaca","#991b1b","🔴 Sin conexión — datos guardados localmente"];
  return <div style={{background:bg,borderBottom:`1px solid ${brd}`,padding:"6px 16px",fontSize:12,fontWeight:600,color,textAlign:"center"}}>{msg}</div>;
}

// ── Sección colapsable ─────────────────────────────────────────────────────
function Seccion({titulo,color="#1e3a5f",children,defaultOpen=true}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div style={{border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{background:"#f8fafc",padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none",WebkitUserSelect:"none"}}>
        <span style={{fontWeight:700,fontSize:14,color}}>{titulo}</span>
        <span style={{fontSize:11,color:"#9ca3af",marginLeft:8}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{padding:"14px 16px",display:"grid",gap:14}}>{children}</div>}
    </div>
  );
}

// ── Editor de personas (contactos / responsables) ─────────────────────────
function PersonasEditor({personas,onChange,titulo}){
  const add    = ()=>onChange([...personas,emptyPersona()]);
  const remove = i=>onChange(personas.filter((_,idx)=>idx!==i));
  const upd    = (i,f,v)=>onChange(personas.map((p,idx)=>idx===i?{...p,[f]:v}:p));
  return(
    <div style={{display:"grid",gap:10}}>
      {personas.map((p,i)=>(
        <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"start"}}>
          <div style={{display:"grid",gap:6}}>
            <input style={S.input()} value={p.nombre} onChange={e=>upd(i,"nombre",e.target.value)} placeholder="Nombre completo"/>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>📱</span>
              <input style={{...S.input(),paddingLeft:34}} value={p.telefono} onChange={e=>upd(i,"telefono",e.target.value)} placeholder="Teléfono" type="tel" inputMode="numeric"/>
            </div>
          </div>
          <button onClick={()=>remove(i)} disabled={personas.length===1}
            style={{background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",cursor:personas.length===1?"not-allowed":"pointer",opacity:personas.length===1?0.4:1,fontSize:14,marginTop:0}}>✕</button>
        </div>
      ))}
      <button onClick={add}
        style={{background:"#eff6ff",color:"#2563eb",border:"1px dashed #93c3fd",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:14,fontWeight:600,width:"100%",touchAction:"manipulation"}}>
        + Agregar {titulo}
      </button>
    </div>
  );
}

// ── Editor de recursos ─────────────────────────────────────────────────────
function RecursosEditor({recursos,onChange,servicio,asignacion=false}){
  const equipos = servicio ? (EQUIPOS_POR_SERVICIO[servicio]||[]) : Object.values(EQUIPOS_POR_SERVICIO).flat();
  const add    = ()=>onChange([...recursos,asignacion?emptyAsignado():emptyRecurso()]);
  const remove = i=>onChange(recursos.filter((_,idx)=>idx!==i));
  const upd    = (i,f,v)=>onChange(recursos.map((r,idx)=>idx===i?{...r,[f]:v}:r));
  return(
    <div style={{display:"grid",gap:10}}>
      {recursos.map((r,i)=>(
        <div key={i} style={{background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:8,padding:"12px",display:"grid",gap:8}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"start"}}>
            <div style={{display:"grid",gap:6}}>
              <select style={{...S.input(),paddingRight:10}} value={r.equipo} onChange={e=>upd(i,"equipo",e.target.value)}>
                <option value="">Seleccioná equipo...</option>
                {equipos.map(eq=><option key={eq} value={eq}>{eq}</option>)}
                <option value="__custom__">✏️ Otro...</option>
              </select>
              {r.equipo==="__custom__"&&<input style={S.input()} value={r.custom} onChange={e=>upd(i,"custom",e.target.value)} placeholder="Describí el equipo..."/>}
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,color:"#6b7280",whiteSpace:"nowrap"}}>Cantidad:</span>
                <input type="number" min={1} style={{...S.input(),width:80,textAlign:"center",padding:"10px 8px"}} value={r.cantidad} onChange={e=>upd(i,"cantidad",Math.max(1,parseInt(e.target.value)||1))}/>
              </div>
            </div>
            <button onClick={()=>remove(i)} disabled={recursos.length===1}
              style={{background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",cursor:recursos.length===1?"not-allowed":"pointer",opacity:recursos.length===1?0.4:1,fontSize:14}}>✕</button>
          </div>
          {asignacion&&<div style={{display:"grid",gap:6}}>
            <input style={S.input()} value={r.proveedor} onChange={e=>upd(i,"proveedor",e.target.value)} placeholder="Empresa proveedora..."/>
            <input style={S.input()} value={r.responsable} onChange={e=>upd(i,"responsable",e.target.value)} placeholder="Responsable / Operador..."/>
          </div>}
        </div>
      ))}
      <button onClick={add}
        style={{background:"#eff6ff",color:"#2563eb",border:"1px dashed #93c3fd",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:14,fontWeight:600,width:"100%",touchAction:"manipulation"}}>
        + Agregar recurso
      </button>
    </div>
  );
}

// ── Campos específicos Carga Terrestre ────────────────────────────────────
function CamposCargaTerrestre({req,setReq}){
  const upd  = (f,v)=>setReq(p=>({...p,[f]:v}));
  const updO = (f,v)=>setReq(p=>({...p,contactoOrigen:{...p.contactoOrigen,[f]:v}}));
  const updD = (f,v)=>setReq(p=>({...p,contactoDestino:{...p.contactoDestino,[f]:v}}));
  return(
    <Seccion titulo="🚛 Datos de Carga Terrestre" color="#2563eb">
      <div style={S.field}>
        <label style={S.label}>Origen</label>
        <input style={S.input()} value={req.origen} onChange={e=>upd("origen",e.target.value)} placeholder="Lugar de origen..."/>
      </div>
      <div style={{background:"#f0f7ff",borderRadius:8,padding:12,display:"grid",gap:8}}>
        <span style={{fontSize:12,fontWeight:600,color:"#3b82f6"}}>Contacto en Origen</span>
        <input style={S.input()} value={req.contactoOrigen.nombre} onChange={e=>updO("nombre",e.target.value)} placeholder="Nombre..."/>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>📱</span>
          <input style={{...S.input(),paddingLeft:34}} value={req.contactoOrigen.telefono} onChange={e=>updO("telefono",e.target.value)} placeholder="Teléfono..." type="tel" inputMode="numeric"/>
        </div>
      </div>
      <div style={S.field}>
        <label style={S.label}>Destino</label>
        <input style={S.input()} value={req.destino} onChange={e=>upd("destino",e.target.value)} placeholder="Lugar de destino..."/>
      </div>
      <div style={{background:"#f0f7ff",borderRadius:8,padding:12,display:"grid",gap:8}}>
        <span style={{fontSize:12,fontWeight:600,color:"#3b82f6"}}>Contacto en Destino</span>
        <input style={S.input()} value={req.contactoDestino.nombre} onChange={e=>updD("nombre",e.target.value)} placeholder="Nombre..."/>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>📱</span>
          <input style={{...S.input(),paddingLeft:34}} value={req.contactoDestino.telefono} onChange={e=>updD("telefono",e.target.value)} placeholder="Teléfono..." type="tel" inputMode="numeric"/>
        </div>
      </div>
      <div style={S.field}>
        <label style={S.label}>Peso y Dimensiones de la Carga</label>
        <input style={S.input()} value={req.pesoDimensionesCarga} onChange={e=>upd("pesoDimensionesCarga",e.target.value)} placeholder="Ej: 5T — 3m x 2m x 2m"/>
      </div>
    </Seccion>
  );
}

// ── Campos específicos Izajes ─────────────────────────────────────────────
function CamposIzajes({req,setReq}){

        <label style={S.label}>Dimensiones del equipo a izar</label>

      </div>
      <div style={S.field}>
        <label style={S.label}>Distancia aprox. de posicionamiento</label>

// ── Campos específicos Provisión de GasOil ───────────────────────────────
function CamposGasOil({req,setReq}){
  const upd = (f,v)=>setReq(p=>({...p,[f]:v}));
  return(
    <Seccion titulo="⛽ Datos de Provisión de GasOil" color="#b45309">
      <div style={S.field}>
        <label style={S.label}>Grado</label>
        <select style={S.input()} value={req.gradoGasOil} onChange={e=>upd("gradoGasOil",e.target.value)}>
          <option value="">Seleccioná el grado...</option>
          <option value="Grado 2">Grado 2</option>
          <option value="Grado 3">Grado 3</option>
        </select>
      </div>
      <div style={S.field}>

        <div style={{position:"relative"}}>
          <input style={{...S.input(),paddingRight:40}} value={req.litrosGasOil}

            placeholder="Ej: 5000" type="text" inputMode="numeric"/>
          <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#9ca3af",pointerEvents:"none"}}>lts</span>

function App(){
  const [view,setView]           = useState("home");
  const [reqs,setReqs]           = useState([]);
  const [loading,setLoading]     = useState(true);
  const [online,setOnline]       = useState(navigator.onLine);
  const [pending,setPending]     = useState(false);
  const [search,setSearch]       = useState("");
  const [filtroS,setFiltroS]     = useState("");
  const [filtroE,setFiltroE]     = useState("");
  const [asignando,setAsignando] = useState(null);
  const [asignForm,setAsignForm] = useState({id:"",recursosAsignados:[emptyAsignado()],fechaProgramada:""});
  const [newReq,setNewReq]       = useState(emptyReq());
  const [submitted,setSubmitted] = useState(false);
  const [enviando,setEnviando]   = useState(false);
  const [errors,setErrors]       = useState({});

  useEffect(()=>{
    const unsub = db.collection(COL).orderBy('_ts','asc')
      .onSnapshot({includeMetadataChanges:true},snap=>{
        setReqs(snap.docs.map(d=>({...d.data(),_docId:d.id})));
        setPending(snap.docs.some(d=>d.metadata.hasPendingWrites));
        setLoading(false);
      },()=>setLoading(false));
    return unsub;
  },[]);

  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return()=>{ window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  },[]);

  const handleServicio = v => setNewReq(p=>({...p,servicio:v,recursosSolicitados:[emptyRecurso()]}));

  const filtered = reqs.filter(r=>{
    const q=search.toLowerCase();
    return(!filtroS||r.servicio===filtroS)&&(!filtroE||r.estado===filtroE)&&
      (!q||(r.id||"").toLowerCase().includes(q)||(r.area||"").toLowerCase().includes(q)||(r.locacion||"").toLowerCase().includes(q));
  });

  const validate=()=>{
    const e={};
    if(!newReq.area.trim())e.area=true;
    if(!newReq.locacion)e.locacion=true;
    if(!newReq.servicio)e.servicio=true;
    if(!newReq.fechaRequerida)e.fechaRequerida=true;
    if(!newReq.imputacionCosto.trim())e.imputacionCosto=true;
    return e;
  };

  const submitReq=async()=>{
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    setEnviando(true);
    try{
      await db.collection(COL).add({...newReq,id:"",estado:"Pendiente",fechaCreacion:new Date().toISOString().split("T")[0],recursosAsignados:[],fechaProgramada:"",_ts:Date.now()});
      setSubmitted(true);
    }catch(err){console.error(err);}
    finally{setEnviando(false);}
  };

  const resetForm=()=>{ setNewReq(emptyReq()); setSubmitted(false); setEnviando(false); setErrors({}); };

  const abrirAsignar=req=>{
    setAsignando(req);
    setAsignForm({id:req.id||"",recursosAsignados:req.recursosAsignados?.length?req.recursosAsignados.map(r=>({...r})):[emptyAsignado()],fechaProgramada:req.fechaProgramada||""});
  };

  const guardarAsignacion=async()=>{
    await db.collection(COL).doc(asignando._docId).update({
      id:asignForm.id,
      recursosAsignados:asignForm.recursosAsignados,
      fechaProgramada:asignForm.fechaProgramada,
      estado:asignForm.recursosAsignados.some(ra=>ra.equipo)?"En Proceso":asignando.estado
    });
    setAsignando(null);
  };

  const completar=async r=>await db.collection(COL).doc(r._docId).update({estado:"Completado"});
  const cancelar =async r=>await db.collection(COL).doc(r._docId).update({estado:"Cancelado"});

  const pendientes =reqs.filter(r=>r.estado==="Pendiente").length;
  const enProceso  =reqs.filter(r=>r.estado==="En Proceso").length;
  const completados=reqs.filter(r=>r.estado==="Completado").length;
  const maxSvc     =Math.max(...SERVICIOS.map(s=>reqs.filter(r=>r.servicio===s).length),1);

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#1e3a5f,#2563eb)",flexDirection:"column",gap:16}}>
      <div style={{fontSize:52}}>🏗️</div>
      <div style={{color:"#fff",fontSize:18,fontWeight:600}}>Cargando...</div>
      <div style={{color:"#93c5fd",fontSize:13}}>{navigator.onLine?"Conectando...":"Cargando datos locales..."}</div>
    </div>
  );

  // ── HOME ──────────────────────────────────────────────────────────────────
  if(view==="home") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)",display:"flex",flexDirection:"column"}}>
      <StatusBar online={online} pendingWrites={pending}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{textAlign:"center",color:"#fff",width:"100%",maxWidth:400}}>
          <div style={{fontSize:52,marginBottom:10}}>🏗️</div>
          <h1 style={{fontSize:24,fontWeight:800,lineHeight:1.2}}>Sistema de Requerimientos Logísticos</h1>
          <p style={{color:"#93c5fd",marginTop:10,fontSize:14,lineHeight:1.5}}>Izajes · Carga Terrestre · Mantenimiento de Caminos · Cargas Líquidas</p>
          <div style={{display:"grid",gap:12,marginTop:36}}>
            <button onClick={()=>setView("solicitante")}
              style={{background:"#fff",color:"#1e3a5f",border:"none",borderRadius:12,padding:"20px 24px",fontWeight:700,fontSize:17,cursor:"pointer",boxShadow:"0 4px 20px #0004",touchAction:"manipulation"}}>
              📝 Ingresar Requerimiento
              <div style={{fontSize:13,fontWeight:400,color:"#6b7280",marginTop:4}}>Soy solicitante</div>
            </button>
            <button onClick={()=>setView("logistica")}
              style={{background:"#1e40af",color:"#fff",border:"2px solid #93c5fd",borderRadius:12,padding:"20px 24px",fontWeight:700,fontSize:17,cursor:"pointer",boxShadow:"0 4px 20px #0004",touchAction:"manipulation"}}>
              📊 Programación Logística
              <div style={{fontSize:13,fontWeight:400,color:"#93c5fd",marginTop:4}}>Equipo interno</div>
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  // ── SOLICITANTE ───────────────────────────────────────────────────────────
  if(view==="solicitante") return(
    <div style={{minHeight:"100vh",background:"#f8fafc",display:"flex",flexDirection:"column"}}>
      <StatusBar online={online} pendingWrites={pending}/>

      {/* Header fijo */}
      <div style={{background:"linear-gradient(90deg,#1e3a5f,#2563eb)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <button onClick={()=>{setView("home");resetForm();}}
          style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",cursor:"pointer",fontSize:18,borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:16}}>📝 Nuevo Requerimiento</div>
          <div style={{color:"#93c5fd",fontSize:11}}>Completá los datos de tu solicitud</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",maxWidth:640,margin:"0 auto",width:"100%"}}>
        {submitted?(
          <div style={{background:"#fff",borderRadius:14,padding:32,textAlign:"center",boxShadow:"0 2px 16px #0001",animation:"fadeIn .3s ease"}}>
            <div style={{fontSize:60}}>✅</div>
            <h2 style={{color:"#10b981",margin:"14px 0 8px",fontSize:22}}>¡Requerimiento enviado!</h2>
            <p style={{color:"#6b7280",fontSize:15,lineHeight:1.5}}>Tu solicitud fue registrada y será gestionada por Programación Logística.</p>
            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:14,margin:"20px 0",fontSize:14,color:"#1d4ed8",lineHeight:1.5}}>
              📧 En breve recibirás un correo con el ID asignado para seguimiento.
            </div>
            {!online&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:12,marginBottom:16,fontSize:13,color:"#92400e"}}>
              ⚠️ Sin conexión — el requerimiento se enviará al recuperar señal.
            </div>}
            <button onClick={resetForm}
              style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:10,padding:"14px 28px",fontWeight:600,cursor:"pointer",fontSize:16,width:"100%",touchAction:"manipulation"}}>
              Cargar otro requerimiento
            </button>
          </div>
        ):(
          <div style={{display:"grid",gap:14,paddingBottom:24}}>

            {/* ── Datos generales ── */}
            <Seccion titulo="📋 Datos Generales">
              <div style={S.field}>
                <label style={S.label}>Área Solicitante *</label>
                <input style={S.input(errors.area)} value={newReq.area}
                  onChange={e=>{setNewReq(p=>({...p,area:e.target.value}));setErrors(p=>({...p,area:false}));}}
                  placeholder="Ej: Mantenimiento, Operaciones..."/>
                {errors.area&&<span style={S.errMsg}>Campo requerido</span>}
              </div>
              <div style={S.field}>
                <label style={S.label}>Locación *</label>
                <select style={S.input(errors.locacion)} value={newReq.locacion}
                  onChange={e=>{setNewReq(p=>({...p,locacion:e.target.value}));setErrors(p=>({...p,locacion:false}));}}>
                  <option value="">Seleccioná la locación...</option>
                  {LOCACIONES.map(l=><option key={l} value={l}>📍 {l}</option>)}
                </select>
                {errors.locacion&&<span style={S.errMsg}>Campo requerido</span>}
              </div>
              <div className="grid-2">
                <div style={S.field}>
                  <label style={S.label}>Tipo de Servicio *</label>
                  <select style={S.input(errors.servicio)} value={newReq.servicio}
                    onChange={e=>{handleServicio(e.target.value);setErrors(p=>({...p,servicio:false}));}}>
                    <option value="">Seleccioná...</option>
                    {SERVICIOS.map(s=><option key={s} value={s}>{servicioIcon[s]} {s}</option>)}
                  </select>
                  {errors.servicio&&<span style={S.errMsg}>Campo requerido</span>}
                </div>
                <div style={S.field}>
                  <label style={S.label}>Fecha Requerida *</label>
                  <input type="date" style={S.input(errors.fechaRequerida)} value={newReq.fechaRequerida}
                    onChange={e=>{setNewReq(p=>({...p,fechaRequerida:e.target.value}));setErrors(p=>({...p,fechaRequerida:false}));}}/>
                  {errors.fechaRequerida&&<span style={S.errMsg}>Campo requerido</span>}
                </div>
              </div>
              <div style={S.field}>
                <label style={S.label}>Prioridad</label>
                <select style={S.input()} value={newReq.prioridad} onChange={e=>setNewReq(p=>({...p,prioridad:e.target.value}))}>
                  {PRIORIDADES.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </Seccion>

            {/* ── Campos específicos ── */}
            {newReq.servicio==="Carga Terrestre"&&<CamposCargaTerrestre req={newReq} setReq={setNewReq}/>}
            {newReq.servicio==="Izajes"&&<CamposIzajes req={newReq} setReq={setNewReq}/>}
            {newReq.servicio==="Provisión de GasOil"&&<CamposGasOil req={newReq} setReq={setNewReq}/>}

            {/* ── Recursos ── */}
            {newReq.servicio&&(
              <Seccion titulo="🔧 Recursos Solicitados">
                <RecursosEditor recursos={newReq.recursosSolicitados} onChange={v=>setNewReq(p=>({...p,recursosSolicitados:v}))} servicio={newReq.servicio} asignacion={false}/>
              </Seccion>
            )}

            {/* ── Contactos ── */}
            <Seccion titulo="👤 Personas de Contacto">
              <PersonasEditor personas={newReq.contactos} onChange={v=>setNewReq(p=>({...p,contactos:v}))} titulo="contacto"/>
            </Seccion>

            {/* ── Permiso de trabajo ── */}
            <Seccion titulo="📄 Responsables del Permiso de Trabajo">
              <PersonasEditor personas={newReq.responsablesPermiso} onChange={v=>setNewReq(p=>({...p,responsablesPermiso:v}))} titulo="responsable"/>
            </Seccion>

            {/* ── Imputación ── */}
            <Seccion titulo="💰 Imputación del Costo *">
              <input style={S.input(errors.imputacionCosto)} value={newReq.imputacionCosto}
                onChange={e=>{setNewReq(p=>({...p,imputacionCosto:e.target.value}));setErrors(p=>({...p,imputacionCosto:false}));}}
                placeholder="Ej: CC-1234 / OT-5678 / Proyecto Norte..."/>
              {errors.imputacionCosto&&<span style={S.errMsg}>Campo requerido</span>}
            </Seccion>

            {/* ── Observaciones ── */}
            <Seccion titulo="📝 Observaciones">
              <textarea style={{...S.input(),height:90,resize:"vertical"}} value={newReq.observaciones} onChange={e=>setNewReq(p=>({...p,observaciones:e.target.value}))} placeholder="Información adicional relevante..."/>
            </Seccion>

            {/* ── Botón enviar ── */}
            <button onClick={submitReq} disabled={enviando}
              style={{background:enviando?"#93c5fd":"#2563eb",color:"#fff",border:"none",borderRadius:12,padding:"16px",fontWeight:700,fontSize:17,cursor:enviando?"not-allowed":"pointer",transition:"background .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:10,touchAction:"manipulation",marginTop:4}}>
              {enviando
                ?<><span style={{display:"inline-block",width:18,height:18,border:"2.5px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/> Enviando...</>
                :"Enviar Requerimiento →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // ── LOGÍSTICA ─────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <StatusBar online={online} pendingWrites={pending}/>
      <div style={{background:"linear-gradient(90deg,#1e3a5f,#2563eb)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <button onClick={()=>setView("home")}
          style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",cursor:"pointer",fontSize:18,borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:16}}>📊 Programación Logística</div>
          <div style={{color:"#93c5fd",fontSize:11}}>Gestión y asignación de requerimientos</div>
        </div>
      </div>

      <div style={{maxWidth:1300,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
          <StatCard label="Total"       value={reqs.length} color="#2563eb" icon="📋"/>
          <StatCard label="Pendientes"  value={pendientes}  color="#f59e0b" icon="⏳"/>
          <StatCard label="En Proceso"  value={enProceso}   color="#3b82f6" icon="⚙️"/>
          <StatCard label="Completados" value={completados} color="#10b981" icon="✅"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
          <div style={{background:"#fff",borderRadius:10,padding:18,border:"1px solid #e5e7eb"}}>
            <div style={{fontWeight:700,color:"#1e3a5f",marginBottom:12,fontSize:14}}>Por Servicio</div>
            {SERVICIOS.map(s=><MiniBar key={s} label={`${servicioIcon[s]} ${s}`} value={reqs.filter(r=>r.servicio===s).length} max={maxSvc} color="#2563eb"/>)}
          </div>
          <div style={{background:"#fff",borderRadius:10,padding:18,border:"1px solid #e5e7eb"}}>
            <div style={{fontWeight:700,color:"#1e3a5f",marginBottom:12,fontSize:14}}>Por Estado</div>
            {ESTADOS.map(s=><MiniBar key={s} label={s} value={reqs.filter(r=>r.estado===s).length} max={reqs.length} color={estadoColor[s]}/>)}
          </div>
        </div>

        <div style={{background:"#fff",borderRadius:10,padding:14,border:"1px solid #e5e7eb",marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input style={{flex:1,minWidth:160,padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:15,outline:"none"}} placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={{padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:14,WebkitAppearance:"none"}} value={filtroS} onChange={e=>setFiltroS(e.target.value)}>
            <option value="">Todos los servicios</option>
            {SERVICIOS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <select style={{padding:"10px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:14,WebkitAppearance:"none"}} value={filtroE} onChange={e=>setFiltroE(e.target.value)}>
            <option value="">Todos los estados</option>
            {ESTADOS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}>
                  {["ID","Fecha","Área","Locación","Servicio","Fecha Req.","Prioridad","Estado","Rec. Solicitados","Rec. Asignados","Contactos","Imputación","Acciones"].map(h=>(
                    <th key={h} style={{padding:"11px 13px",textAlign:"left",fontWeight:700,color:"#374151",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={13} style={{padding:32,textAlign:"center",color:"#9ca3af"}}>No hay requerimientos</td></tr>}
                {filtered.map((r,i)=>(
                  <tr key={r._docId||i} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa"}}>
                    <td style={{padding:"10px 13px",fontWeight:700,color:"#2563eb",whiteSpace:"nowrap"}}>{r.id||<span style={{color:"#d1d5db",fontWeight:400,fontStyle:"italic"}}>Sin ID</span>}</td>
                    <td style={{padding:"10px 13px",color:"#6b7280",whiteSpace:"nowrap"}}>{r.fechaCreacion}</td>
                    <td style={{padding:"10px 13px",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.area}</td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}><Badge color="#6366f1" text={`📍 ${r.locacion}`}/></td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}><Badge color="#2563eb" text={`${servicioIcon[r.servicio]} ${r.servicio}`}/></td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}>{r.fechaRequerida}</td>
                    <td style={{padding:"10px 13px"}}><Badge color={prioridadColor[r.prioridad]} text={r.prioridad}/></td>
                    <td style={{padding:"10px 13px"}}><Badge color={estadoColor[r.estado]} text={r.estado}/></td>
                    <td style={{padding:"10px 13px",maxWidth:160,fontSize:12}}>
                      {(r.recursosSolicitados||[]).map((rs,idx)=>(
                        <div key={idx} style={{whiteSpace:"nowrap"}}>🔸 {rs.equipo==="__custom__"?rs.custom:rs.equipo} <strong>×{rs.cantidad}</strong></div>
                      ))}
                    </td>
                    <td style={{padding:"10px 13px",maxWidth:160,fontSize:12}}>
                      {!(r.recursosAsignados||[]).length
                        ?<span style={{color:"#d1d5db"}}>Sin asignar</span>
                        :(r.recursosAsignados||[]).map((ra,idx)=>(
                          <div key={idx} style={{whiteSpace:"nowrap",color:"#10b981"}}>✅ {ra.equipo==="__custom__"?ra.custom:ra.equipo} <strong>×{ra.cantidad}</strong></div>
                        ))}
                    </td>
                    <td style={{padding:"10px 13px",fontSize:12,maxWidth:140}}>
                      {(r.contactos||[]).filter(c=>c.nombre).map((c,idx)=>(
                        <div key={idx} style={{whiteSpace:"nowrap"}}>👤 {c.nombre} {c.telefono&&<a href={`https://wa.me/549${c.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366",textDecoration:"none"}}>📱</a>}</div>
                      ))}
                    </td>
                    <td style={{padding:"10px 13px",fontSize:12,color:r.imputacionCosto?"#374151":"#d1d5db",whiteSpace:"nowrap"}}>{r.imputacionCosto||"—"}</td>
                    <td style={{padding:"10px 13px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",gap:5}}>
                        {r.estado!=="Completado"&&r.estado!=="Cancelado"&&(
                          <button onClick={()=>abrirAsignar(r)} style={{background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600,touchAction:"manipulation"}}>
                            {r.estado==="Pendiente"?"Asignar":"Editar"}
                          </button>
                        )}
                        {r.estado==="En Proceso"&&<button onClick={()=>completar(r)} style={{background:"#f0fdf4",color:"#10b981",border:"1px solid #bbf7d0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✓</button>}
                        {r.estado==="Pendiente"&&<button onClick={()=>cancelar(r)} style={{background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✕</button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Modal Asignar */}
      {asignando&&(
        <div style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setAsignando(null);}}>
          <div style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxWidth:760,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -8px 40px #0003",animation:"fadeIn .25s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <h3 style={{color:"#1e3a5f",fontSize:17,margin:0}}>Asignar Requerimiento</h3>
                <div style={{color:"#6b7280",fontSize:13,marginTop:2}}>{servicioIcon[asignando.servicio]} {asignando.servicio}</div>
              </div>
              <button onClick={()=>setAsignando(null)} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:16,color:"#374151"}}>✕</button>
            </div>

            <div style={{background:"#f8fafc",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,display:"flex",flexWrap:"wrap",gap:10}}>
              <span>🏢 <strong>{asignando.area}</strong></span>
              <span>📍 <strong>{asignando.locacion}</strong></span>
              <span>📅 <strong>{asignando.fechaRequerida}</strong></span>
              <Badge color={prioridadColor[asignando.prioridad]} text={asignando.prioridad}/>
            </div>

            <div style={{marginBottom:14}}>
              <label style={S.label}>N° / ID de Solicitud</label>
              <input style={S.input()} value={asignForm.id} onChange={e=>setAsignForm(p=>({...p,id:e.target.value}))} placeholder="Ej: SOL-001, OT-2345..."/>
            </div>

            {asignando.servicio==="Carga Terrestre"&&(asignando.origen||asignando.destino)&&(
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#1d4ed8",marginBottom:8}}>🚛 Datos de Carga</div>
                {asignando.origen&&<div>📦 <strong>Origen:</strong> {asignando.origen} {asignando.contactoOrigen?.nombre&&`— ${asignando.contactoOrigen.nombre}`}</div>}
                {asignando.destino&&<div style={{marginTop:4}}>🏁 <strong>Destino:</strong> {asignando.destino} {asignando.contactoDestino?.nombre&&`— ${asignando.contactoDestino.nombre}`}</div>}
                {asignando.pesoDimensionesCarga&&<div style={{marginTop:4}}>⚖️ <strong>Peso/Dim:</strong> {asignando.pesoDimensionesCarga}</div>}
              </div>
            )}
            {asignando.servicio==="Izajes"&&(asignando.pesoEquipoIzar||asignando.distanciaEquipo)&&(
              <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#6d28d9",marginBottom:8}}>🏗️ Datos de Izaje</div>
                {asignando.pesoEquipoIzar&&<div>⚖️ <strong>Peso:</strong> {asignando.pesoEquipoIzar}</div>}
                {asignando.dimensionesEquipoIzar&&<div style={{marginTop:4}}>📐 <strong>Dimensiones:</strong> {asignando.dimensionesEquipoIzar}</div>}
                {asignando.distanciaEquipo&&<div style={{marginTop:4}}>📏 <strong>Distancia:</strong> {asignando.distanciaEquipo}</div>}
              </div>
            )}

            {(asignando.contactos||[]).some(c=>c.nombre)&&(
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#166534",marginBottom:6}}>👤 Contactos</div>
                {(asignando.contactos||[]).filter(c=>c.nombre).map((c,i)=>(
                  <div key={i}>• {c.nombre} {c.telefono&&<a href={`https://wa.me/549${c.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366"}}>📱 {c.telefono}</a>}</div>
                ))}
              </div>
            )}
            {(asignando.responsablesPermiso||[]).some(r=>r.nombre)&&(
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
                <div style={{fontWeight:700,color:"#92400e",marginBottom:6}}>📄 Responsables del Permiso</div>
                {(asignando.responsablesPermiso||[]).filter(r=>r.nombre).map((r,i)=>(
                  <div key={i}>• {r.nombre} {r.telefono&&<a href={`https://wa.me/549${r.telefono}`} target="_blank" rel="noreferrer" style={{color:"#25d366"}}>📱 {r.telefono}</a>}</div>
                ))}
              </div>
            )}

            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#92400e",marginBottom:8}}>📋 Recursos Solicitados</div>
              {(asignando.recursosSolicitados||[]).map((rs,i)=>(
                <div key={i} style={{fontSize:13,color:"#78350f",marginBottom:4}}>🔸 <strong>{rs.equipo==="__custom__"?rs.custom:rs.equipo}</strong> ×{rs.cantidad}</div>
              ))}
            </div>

            <div style={{fontWeight:700,color:"#1e3a5f",fontSize:14,marginBottom:10}}>⚙️ Recursos a Asignar</div>
            <RecursosEditor recursos={asignForm.recursosAsignados} onChange={v=>setAsignForm(p=>({...p,recursosAsignados:v}))} servicio={asignando.servicio} asignacion={true}/>

            <div style={{marginTop:14}}>
              <label style={S.label}>Fecha y Hora Programada</label>
              <input type="datetime-local" style={S.input()} value={asignForm.fechaProgramada} onChange={e=>setAsignForm(p=>({...p,fechaProgramada:e.target.value}))}/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginTop:20}}>
              <button onClick={()=>setAsignando(null)} style={{background:"#f3f4f6",color:"#374151",border:"none",borderRadius:10,padding:14,fontWeight:600,cursor:"pointer",fontSize:15,touchAction:"manipulation"}}>Cancelar</button>
              <button onClick={guardarAsignacion} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:10,padding:14,fontWeight:700,cursor:"pointer",fontSize:15,touchAction:"manipulation"}}>Guardar Asignación</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
