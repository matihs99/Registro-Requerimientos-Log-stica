<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#002B45"/>
  <g transform="translate(256,240)" fill="none" stroke="#0096B2" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- crane base -->
    <line x1="-100" y1="120" x2="100" y2="120"/>
    <line x1="0" y1="120" x2="0" y2="-80"/>
    <!-- crane boom -->
    <line x1="0" y1="-80" x2="120" y2="-80"/>
    <!-- crane cable -->
    <line x1="120" y1="-80" x2="120" y2="20" stroke-dasharray="8 8"/>
    <!-- hook -->
    <path d="M110,20 Q120,40 130,20" stroke-width="22"/>
    <!-- truck body -->
    <rect x="-140" y="60" width="120" height="60" rx="8" fill="#0096B2" stroke="none"/>
    <rect x="-20" y="80" width="50" height="40" rx="6" fill="#0096B2" stroke="none"/>
    <!-- wheels -->
    <circle cx="-110" cy="124" r="16" fill="#002B45" stroke="#0096B2" stroke-width="10"/>
    <circle cx="-50" cy="124" r="16" fill="#002B45" stroke="#0096B2" stroke-width="10"/>
    <circle cx="10" cy="124" r="16" fill="#002B45" stroke="#0096B2" stroke-width="10"/>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="white">REQ</text>
</svg>
